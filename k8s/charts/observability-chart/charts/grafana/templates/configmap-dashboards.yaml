apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-grafana-dashboards
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/provisioning/dashboards
          foldersFromFilesStructure: false
  service-health-overview.json: |
{{ .Files.Get "dashboards/service-health-overview.json" | indent 4 }}
  jvm-metrics.json: |
{{ .Files.Get "dashboards/jvm-metrics.json" | indent 4 }}
  kafka-event-pipeline.json: |
{{ .Files.Get "dashboards/kafka-event-pipeline.json" | indent 4 }}
  iot-business-metrics.json: |
{{ .Files.Get "dashboards/iot-business-metrics.json" | indent 4 }}
