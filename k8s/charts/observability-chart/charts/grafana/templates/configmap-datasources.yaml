apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://observability-prometheus.default.svc.cluster.local:9090
        isDefault: true
        access: proxy
        editable: true

      - name: Loki
        type: loki
        uid: loki
        url: http://observability-loki.default.svc.cluster.local:3100
        access: proxy
        editable: true

      - name: Tempo
        type: tempo
        uid: tempo
        url: http://observability-tempo.default.svc.cluster.local:3200
        access: proxy
        editable: true
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
          serviceMap:
            datasourceUid: prometheus
