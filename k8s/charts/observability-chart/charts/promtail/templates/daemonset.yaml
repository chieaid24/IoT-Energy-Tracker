apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: observability-promtail
spec:
  selector:
    matchLabels:
      app: observability-promtail
  template:
    metadata:
      labels:
        app: observability-promtail
    spec:
      serviceAccountName: observability-promtail
      containers:
        - name: promtail
          image: grafana/promtail:3.2.0
          args:
            - "-config.file=/etc/promtail/promtail.yaml"
          ports:
            - containerPort: 9080
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 200m
      volumes:
        - name: config
          configMap:
            name: observability-promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
