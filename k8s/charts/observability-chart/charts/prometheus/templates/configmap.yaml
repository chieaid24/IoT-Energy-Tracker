apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'user-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['microservices-user-service.default.svc.cluster.local:8080']

      - job_name: 'device-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['microservices-device-service.default.svc.cluster.local:8081']

      - job_name: 'ingestion-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['microservices-ingestion-service.default.svc.cluster.local:8082']

      - job_name: 'usage-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['microservices-usage-service.default.svc.cluster.local:8083']

      - job_name: 'alert-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['microservices-alert-service.default.svc.cluster.local:8084']

      - job_name: 'insight-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['microservices-insight-service.default.svc.cluster.local:8085']
