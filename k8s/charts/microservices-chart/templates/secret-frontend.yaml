{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-frontend-secret
  namespace: {{ .Values.global.namespace }}
type: Opaque
stringData:
  NEXTAUTH_SECRET: {{ .Values.frontend.auth.nextauthSecret }}
  GOOGLE_CLIENT_ID: {{ .Values.frontend.auth.googleClientId | default "" | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.frontend.auth.googleClientSecret | default "" | quote }}
{{- end }}
