{{- if .Values.replica.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-mysql-replica
spec:
  serviceName: {{ .Release.Name }}-mysql-replica-headless
  replicas: 1
  selector:
    matchLabels:
      app: mysql
      role: replica
  template:
    metadata:
      labels:
        app: mysql
        role: replica
    spec:
      initContainers:
      - name: wait-for-primary
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z {{ .Release.Name }}-mysql-0.{{ .Release.Name }}-mysql-headless.{{ .Release.Namespace }}.svc.cluster.local 3306; do
            echo "waiting for primary mysql at pod DNS..."
            sleep 2
          done
      containers:
      - name: mysql
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: 3306

        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-mysql-secret
              key: root-password
        - name: MYSQL_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-mysql-secret
              key: replicator-password

        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
        - name: config
          mountPath: /docker-entrypoint-initdb.d/replica-init.sql
          subPath: replica-init.sql
        - name: config
          mountPath: /etc/mysql/conf.d/replica.cnf
          subPath: replica.cnf

        livenessProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "localhost"]
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "localhost"]
          initialDelaySeconds: 5
          periodSeconds: 5

        resources:
          requests:
            memory: {{ .Values.replica.resources.requests.memory }}
            cpu: {{ .Values.replica.resources.requests.cpu }}
          limits:
            memory: {{ .Values.replica.resources.limits.memory }}
            cpu: {{ .Values.replica.resources.limits.cpu }}

      volumes:
      - name: config
        configMap:
          name: {{ .Release.Name }}-mysql-config
      {{- if not .Values.persistence.enabled }}
      - name: data
        emptyDir: {}
      {{- end }}

  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: {{ .Values.persistence.size }}
  {{- end }}
{{- end }}
