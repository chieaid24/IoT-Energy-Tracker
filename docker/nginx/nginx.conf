server {
    listen 80;
    resolver 127.0.0.11 valid=10s;

    location /api/v1/auth {
        set $upstream_user_service http://user-service:8080;
        proxy_pass $upstream_user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/user {
        set $upstream_user_service http://user-service:8080;
        proxy_pass $upstream_user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/device {
        set $upstream_device_service http://device-service:8081;
        proxy_pass $upstream_device_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/ingestion {
        set $upstream_ingestion_service http://ingestion-service:8082;
        proxy_pass $upstream_ingestion_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/usage {
        set $upstream_usage_service http://usage-service:8083;
        proxy_pass $upstream_usage_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/alert {
        set $upstream_alert_service http://alert-service:8084;
        proxy_pass $upstream_alert_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/insight {
        set $upstream_insight_service http://insight-service:8085;
        proxy_pass $upstream_insight_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /_next/ {
        set $upstream_frontend http://frontend:3000;
        proxy_pass $upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        set $upstream_frontend http://frontend:3000;
        proxy_pass $upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
